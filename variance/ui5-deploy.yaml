# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "3.1"
metadata:
  name: au.com.iesol.po.confirmation.variance
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: http://192.168.41.53:50000
          client: "100"
        app:
          name: /IESOL/ZSUPL_ORD_CONF
          description: Supplier order confirmations
          package: /IESOL/SUPL_CONFIRMATIONS
          transport: DEVK900071
        exclude:
          - /test/
